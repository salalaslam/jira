# Example nginx vhost for exposing MinIO over HTTPS.
# Copy to your nginx conf.d directory, replace placeholders, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Placeholders:
#   <MINIO_HOST>     — public hostname (e.g. s3.example.com)
#   <CERT_NAME>      — Let's Encrypt certificate name
#   <MINIO_UPSTREAM> — MinIO listen address (default: 127.0.0.1:9000)

server {
    server_name <MINIO_HOST>;
    client_max_body_size 25m;

    location / {
        proxy_pass http://<MINIO_UPSTREAM>;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/<CERT_NAME>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<CERT_NAME>/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name <MINIO_HOST>;
    listen 80;
    return 301 https://$host$request_uri;
}
