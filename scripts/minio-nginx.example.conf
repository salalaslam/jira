# Example nginx vhost for exposing MinIO on your server.
# Copy to /etc/nginx/conf.d/s3.<MINIO_HOST>.conf on the server, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ensure DNS for <MINIO_HOST> points at the server IP.
# The wildcard cert on <CERT_NAME> covers *.<your-domain> subdomains.

server {
    server_name <MINIO_HOST>;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/<CERT_NAME>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<CERT_NAME>/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name <MINIO_HOST>;
    listen 80;
    return 301 https://$host$request_uri;
}
